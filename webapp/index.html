<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}
button{
    padding:15px;
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>🎭 Mafia Mini App</h1>
<p id="user"></p>
<p id="role">Нажми кнопку чтобы получить роль</p>

<button onclick="getRole()">Получить роль</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;
document.getElementById("user").innerText =
"Игрок: " + (user?.first_name || "Гость");

function getRole(){
    const roles = ["😈 Мафия", "🙂 Мирный"];
    const role = roles[Math.floor(Math.random()*roles.length)];
    document.getElementById("role").innerText = "Твоя роль: " + role;
}
</script>

</body>
</html>
